<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGBM 線上SPC監控與AI模型導入規劃</title>
<style>
  :root{
    --bg-void:#0A0E14;
    --bg-panel:#11161E;
    --bg-raised:#161C26;
    --bg-inset:#0D1219;
    --line:#232B38;
    --line-soft:#1A212C;
    --text-primary:#E8ECF1;
    --text-muted:#8A97AE;
    --text-dim:#4C5872;
    --cyan:#4FD1C5;
    --amber:#F2B84B;
    --red:#F0555A;
    --violet:#8B7FE8;
    --green:#5FD98A;
    --font-sans:'IBM Plex Sans','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:'IBM Plex Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-void);color:var(--text-primary);font-family:var(--font-sans);height:100%;overflow:hidden;}
  ::selection{background:var(--violet);color:#0A0E14;}

  #deck{position:relative;width:100vw;height:100vh;}

  .slide{
    position:absolute;inset:0;display:none;flex-direction:column;
    padding:64px 88px 90px;
    opacity:0;transition:opacity .35s ease;
  }
  .slide.active{display:flex;opacity:1;}
  .slide-inner{max-width:1280px;margin:0 auto;width:100%;height:100%;display:flex;flex-direction:column;}

  /* ---------- shared bits ---------- */
  .kicker{
    font-family:var(--font-mono);font-size:13px;letter-spacing:3px;color:var(--cyan);
    text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;
  }
  .kicker .num{
    width:26px;height:26px;border-radius:6px;background:rgba(79,209,197,.12);
    border:1px solid rgba(79,209,197,.4);display:flex;align-items:center;justify-content:center;
    font-size:12px;color:var(--cyan);
  }
  h1.title{font-size:clamp(30px,4.2vw,52px);line-height:1.25;font-weight:700;margin:0 0 18px;letter-spacing:-.5px;}
  h1.title .accent{color:var(--cyan);}
  h1.title .accent2{color:var(--violet);}
  h1.title .accent3{color:var(--amber);}
  p.lead{font-size:clamp(15px,1.5vw,19px);color:var(--text-muted);line-height:1.75;max-width:900px;margin:0 0 20px;}

  .glossary-tag{
    display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;
    color:var(--amber);background:rgba(242,184,75,.1);border:1px solid rgba(242,184,75,.3);
    border-radius:20px;padding:4px 12px;margin-bottom:16px;letter-spacing:.5px;
  }

  .body-area{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}

  /* ---------- cover ---------- */
  .cover .brand-row{display:flex;align-items:center;gap:16px;margin-bottom:40px;}
  .brand-mark{
    width:52px;height:52px;border-radius:12px;
    background:conic-gradient(from 220deg,var(--cyan),var(--violet) 40%,var(--cyan) 80%);
    display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);
    font-weight:700;color:#0A0E14;font-size:17px;
  }
  .cover .eq-tag{font-family:var(--font-mono);font-size:13px;color:var(--text-dim);letter-spacing:2px;}
  .cover h1.title{font-size:clamp(38px,5.4vw,68px);}
  .cover-meta{display:flex;gap:36px;margin-top:50px;flex-wrap:wrap;}
  .cover-meta .m{font-family:var(--font-mono);}
  .cover-meta .m .k{font-size:10.5px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
  .cover-meta .m .v{font-size:16px;color:var(--text-primary);}
  .cover-note{
    margin-top:auto;padding-top:30px;border-top:1px solid var(--line-soft);
    font-family:var(--font-mono);font-size:12px;color:var(--text-dim);
  }

  /* ---------- agenda ---------- */
  .agenda-list{display:flex;flex-direction:column;gap:4px;}
  .agenda-item{
    display:flex;align-items:center;gap:22px;padding:16px 20px;border-radius:10px;
    border:1px solid transparent;
  }
  .agenda-item .n{font-family:var(--font-mono);font-size:22px;color:var(--text-dim);width:38px;flex:none;}
  .agenda-item .t{font-size:18px;font-weight:600;}
  .agenda-item .s{font-size:13px;color:var(--text-muted);margin-top:2px;}
  .agenda-item.hl{background:var(--bg-panel);border-color:var(--line);}
  .agenda-item.hl .n{color:var(--cyan);}

  /* ---------- number cards ---------- */
  .stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:10px;}
  .stat-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:22px 20px;}
  .stat-card .v{font-family:var(--font-mono);font-size:36px;font-weight:700;color:var(--cyan);}
  .stat-card .l{font-size:13px;color:var(--text-muted);margin-top:6px;}

  /* ---------- glossary cards ---------- */
  .term-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .term-card{background:var(--bg-panel);border:1px solid var(--line);border-left:3px solid var(--violet);border-radius:10px;padding:16px 18px;}
  .term-card .tname{font-weight:700;font-size:15.5px;margin-bottom:6px;display:flex;align-items:baseline;gap:8px;}
  .term-card .tname .en{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);font-weight:400;}
  .term-card .tdesc{font-size:13.5px;color:var(--text-muted);line-height:1.65;}
  .term-card .tanalogy{font-size:12.5px;color:var(--amber);margin-top:6px;}

  /* ---------- image slides ---------- */
  .chart-slide-layout{display:grid;grid-template-columns:1.15fr 0.85fr;gap:36px;align-items:center;}
  .chart-slide-layout img{width:100%;max-height:48vh;object-fit:contain;border-radius:10px;border:1px solid var(--line);background:#fff;}
  .full-chart-layout{display:flex;flex-direction:column;gap:16px;}
  .full-chart-layout img{width:100%;max-height:42vh;object-fit:contain;border-radius:10px;border:1px solid var(--line);background:#fff;margin:0 auto;}
  .full-chart-layout .below{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
  .full-chart-layout .below > div{flex:1;min-width:280px;}
  .insight-box{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-top:14px;}
  .insight-box .k{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px;}
  .insight-box p{margin:0;font-size:14.5px;color:var(--text-muted);line-height:1.7;}
  .metric-pill{
    display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13px;
    background:rgba(240,85,90,.12);color:var(--red);border:1px solid rgba(240,85,90,.35);
    border-radius:20px;padding:5px 13px;margin:4px 6px 0 0;
  }
  .metric-pill.cyan{background:rgba(79,209,197,.1);color:var(--cyan);border-color:rgba(79,209,197,.35);}
  .metric-pill.amber{background:rgba(242,184,75,.1);color:var(--amber);border-color:rgba(242,184,75,.35);}
  .metric-pill.violet{background:rgba(139,127,232,.1);color:var(--violet);border-color:rgba(139,127,232,.35);}

  /* ---------- roadmap ---------- */
  .roadmap{display:flex;gap:14px;margin-top:10px;}
  .rm-card{flex:1;background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:20px 18px;position:relative;}
  .rm-card .rn{
    font-family:var(--font-mono);font-size:12px;color:var(--bg-void);background:var(--text-dim);
    width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-weight:700;
  }
  .rm-card.done .rn{background:var(--cyan);}
  .rm-card.next .rn{background:var(--amber);}
  .rm-card .rtitle{font-weight:700;font-size:15px;margin-bottom:6px;}
  .rm-card .rtime{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:10px;}
  .rm-card .rdesc{font-size:12.5px;color:var(--text-muted);line-height:1.6;}
  .rm-card .rstatus{
    position:absolute;top:18px;right:16px;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.5px;
    padding:2px 8px;border-radius:10px;text-transform:uppercase;
  }
  .rm-card.done .rstatus{background:rgba(79,209,197,.12);color:var(--cyan);}
  .rm-card:not(.done) .rstatus{background:rgba(124,138,160,.12);color:var(--text-dim);}
  .rm-arrow{align-self:center;color:var(--text-dim);font-size:20px;}

  /* ---------- detail phase slide ---------- */
  .phase-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;}
  .phase-badge{
    font-family:var(--font-mono);width:46px;height:46px;border-radius:10px;display:flex;
    align-items:center;justify-content:center;font-size:18px;font-weight:700;flex:none;
  }
  .phase-status{
    font-family:var(--font-mono);font-size:11px;letter-spacing:1px;padding:4px 12px;border-radius:14px;
    text-transform:uppercase;margin-left:auto;
  }
  .check-list{display:flex;flex-direction:column;gap:12px;}
  .check-item{display:flex;gap:14px;align-items:flex-start;}
  .check-item .ic{
    width:22px;height:22px;border-radius:6px;flex:none;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:12px;
  }
  .check-item .tx{font-size:15px;color:var(--text-primary);line-height:1.6;}
  .check-item .tx .sub{display:block;font-size:12.5px;color:var(--text-muted);margin-top:2px;}

  /* ---------- diagram elements ---------- */
  .diagram-wrap{display:flex;align-items:center;justify-content:center;margin:14px 0;}
  .flow-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;}
  .flow-box{
    background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:16px 20px;
    text-align:center;min-width:120px;
  }
  .flow-box .fi{font-size:24px;margin-bottom:6px;}
  .flow-box .fn{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
  .flow-box .ft{font-weight:700;font-size:14.5px;margin:3px 0;}
  .flow-box .fs{font-size:11.5px;color:var(--text-muted);}
  .flow-arrow{color:var(--text-dim);font-size:20px;}

  .analogy-box{
    background:rgba(242,184,75,.06);border:1px dashed rgba(242,184,75,.4);border-radius:12px;
    padding:16px 20px;margin-top:16px;display:flex;gap:12px;align-items:flex-start;
  }
  .analogy-box .ic{font-size:20px;}
  .analogy-box .tx{font-size:14px;color:var(--text-muted);line-height:1.7;}
  .analogy-box .tx b{color:var(--amber);}

  /* ---------- closing ---------- */
  .closing .big{font-family:var(--font-mono);font-size:clamp(40px,6vw,80px);color:var(--cyan);font-weight:700;line-height:1;}
  .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:36px;}
  .contact-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
  .contact-card .k{font-family:var(--font-mono);font-size:10.5px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .contact-card .v{font-size:14px;color:var(--text-primary);line-height:1.6;}

  /* ---------- nav ---------- */
  .navbar{
    position:fixed;bottom:0;left:0;right:0;height:64px;display:flex;align-items:center;
    justify-content:space-between;padding:0 32px;background:linear-gradient(180deg,transparent,rgba(10,14,20,.9) 40%);
    z-index:30;
  }
  .navbar .side{display:flex;align-items:center;gap:14px;}
  .nav-btn{
    background:var(--bg-panel);border:1px solid var(--line);color:var(--text-primary);
    width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:16px;transition:background .15s,border-color .15s;
  }
  .nav-btn:hover:not(:disabled){background:var(--bg-raised);border-color:var(--cyan);color:var(--cyan);}
  .nav-btn:disabled{opacity:.3;cursor:default;}
  .nav-counter{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);letter-spacing:.5px;}
  .nav-dots{display:flex;gap:6px;}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--line);cursor:pointer;transition:background .15s,transform .15s;}
  .nav-dot.active{background:var(--cyan);transform:scale(1.4);}
  .nav-section-label{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:1px;}

  .progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--violet));z-index:31;transition:width .3s ease;}

  @media (max-width:900px){
    .slide{padding:40px 24px 90px;}
    .stat-cards{grid-template-columns:repeat(2,1fr);}
    .term-grid{grid-template-columns:1fr;}
    .chart-slide-layout{grid-template-columns:1fr;}
    .roadmap{flex-direction:column;}
    .contact-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width:0%"></div>
<div id="deck"></div>

<div class="navbar">
  <div class="side">
    <button class="nav-btn" id="prevBtn" title="上一頁 (←)">‹</button>
    <span class="nav-counter"><span id="curNum">1</span> / <span id="totalNum">1</span></span>
    <button class="nav-btn" id="nextBtn" title="下一頁 (→)">›</button>
  </div>
  <div class="nav-section-label" id="sectionLabel"></div>
  <div class="side" id="dotsWrap"></div>
</div>

<script>
/* ============================================================
   SLIDE DATA — each item: { section, html }
   section is used for the bottom-right label
   ============================================================ */
const SLIDES = [];
function addSlide(section, html){ SLIDES.push({section, html}); }

/* ---------------- 0. COVER ---------------- */
addSlide('開場', `
<div class="slide-inner cover">
  <div class="brand-row">
    <div class="brand-mark">MA</div>
    <div>
      <div class="eq-tag">EQUIPMENT MA20-3113 &nbsp;·&nbsp; BGBM PROCESS</div>
    </div>
  </div>
  <div class="body-area" style="justify-content:flex-start;">
    <h1 class="title">BGBM 製程<br><span class="accent">線上 SPC 監控</span> 與 <span class="accent2">AI 模型</span>導入規劃</h1>
    <p class="lead">這份簡報用白話文說明：什麼是 BGBM？什麼是 SPC？我們口中的「AI 模型」到底是指什麼？<br>
    以及我們如何用設備既有的 Log 資料，一步步做出可以馬上上線的製程監控與智慧化規劃。</p>
  </div>
  <div class="cover-meta">
    <div class="m"><div class="k">設備</div><div class="v">MA20-3113</div></div>
    <div class="m"><div class="k">製程</div><div class="v">晶圓背面金屬化 (BGBM)</div></div>
    <div class="m"><div class="k">分析期間</div><div class="v">2026/05/29 – 06/04</div></div>
    <div class="m"><div class="k">版本</div><div class="v">v1.0 · 給不熟悉BGBM製程的夥伴</div></div>
  </div>
  <div class="cover-note">資料來源：設備 MA20-3113 製程 Log（100個檔案）· 本簡報內容改寫自《BGBM 製程監控與 AI 模型導入說明》</div>
</div>
`);

/* ---------------- 1. AGENDA ---------------- */
addSlide('大綱', `
<div class="slide-inner">
  <div class="kicker"><span class="num">◆</span>今天要聊什麼</div>
  <h1 class="title">簡報大綱</h1>
  <div class="body-area">
    <div class="agenda-list">
      <div class="agenda-item hl"><span class="n">01</span><div><div class="t">先搞懂 BGBM 在做什麼</div><div class="s">用白話文解釋製程與關鍵名詞，不懂設備也能聽懂</div></div></div>
      <div class="agenda-item"><span class="n">02</span><div><div class="t">什麼是 SPC？什麼是這裡說的「AI 模型」？</div><div class="s">破除迷思，講清楚我們實際在做的技術是什麼</div></div></div>
      <div class="agenda-item"><span class="n">03</span><div><div class="t">從既有 Log 資料裡，我們挖到了什麼？</div><div class="s">4 個真實案例，證明這件事不是空談</div></div></div>
      <div class="agenda-item"><span class="n">04</span><div><div class="t">已經做好的線上監控儀表板</div><div class="s">不只是規劃，是可以直接打開來用的成果</div></div></div>
      <div class="agenda-item"><span class="n">05</span><div><div class="t">AI 模型分階段導入地圖</div><div class="s">4個階段，由易到難，逐步產生價值</div></div></div>
      <div class="agenda-item"><span class="n">06</span><div><div class="t">下一步需要什麼？</div><div class="s">資料串接與後續建議</div></div></div>
    </div>
  </div>
</div>
`);

/* ---------------- 2. 名詞解釋 BGBM ---------------- */
addSlide('BGBM是什麼', `
<div class="slide-inner">
  <div class="glossary-tag">📖 名詞解釋 ①</div>
  <h1 class="title">什麼是 <span class="accent">BGBM</span>？</h1>
  <div class="body-area">
    <p class="lead">BGBM＝<b style="color:var(--text-primary)">Back Grinding Back Metal</b>，中文可以理解成「晶圓背面研磨 + 背面金屬化」。<br>
    白話說：把晶圓背面磨薄，再鍍上一層層金屬。</p>
    <div class="flow-row" style="margin-top:10px;">
      <div class="flow-box">
        <div class="fi">🔵</div>
        <div class="fn">STEP 1</div>
        <div class="ft">晶圓背面研磨</div>
        <div class="fs">把整片晶圓磨薄，讓最終封裝的晶片更薄</div>
      </div>
      <div class="flow-arrow">→</div>
      <div class="flow-box">
        <div class="fi">✨</div>
        <div class="fn">STEP 2（本簡報範圍）</div>
        <div class="ft">背面金屬化</div>
        <div class="fs">在磨薄後的背面鍍上金屬層，讓晶片背面能導電、能焊接</div>
      </div>
    </div>
    <div class="analogy-box">
      <div class="ic">💡</div>
      <div class="tx">生活化比喻：晶圓就像一張很薄的餅乾。<b>先把餅乾背面磨平磨薄</b>，再<b>刷上一層層可以導電的「金屬糖霜」</b>，之後才能把餅乾（晶片）黏、焊到電路板上。本簡報要談的，就是這個「刷金屬糖霜」的機台怎麼監控。</div>
    </div>
  </div>
</div>
`);

/* ---------------- 3. 濺鍍解釋 ---------------- */
addSlide('濺鍍是什麼', `
<div class="slide-inner">
  <div class="glossary-tag">📖 名詞解釋 ②</div>
  <h1 class="title">機台怎麼把金屬「鍍」上去？— <span class="accent2">濺鍍 Sputtering</span></h1>
  <div class="body-area">
    <p class="lead">機台用的技術叫「濺鍍」：用高能量的氣體離子去撞擊一塊金屬塊（叫做<b style="color:var(--text-primary)">靶材 Target</b>），
    把金屬原子撞飛出來，飛濺後就均勻附著在晶圓表面，形成一層極薄的金屬膜。</p>
    <div class="diagram-wrap">
      <svg width="720" height="200" viewBox="0 0 720 200">
        <rect x="40" y="30" width="90" height="30" rx="4" fill="#161C26" stroke="#232B38"/>
        <text x="85" y="50" fill="#E8ECF1" font-size="12" text-anchor="middle" font-family="IBM Plex Mono">靶材 (金屬塊)</text>
        <circle cx="150" cy="90" r="4" fill="#4FD1C5"/><circle cx="170" cy="70" r="4" fill="#4FD1C5"/><circle cx="160" cy="110" r="4" fill="#4FD1C5"/>
        <text x="160" y="140" fill="#8A97AE" font-size="11" text-anchor="middle" font-family="IBM Plex Sans">氬離子轟擊</text>
        <path d="M85,60 L155,90" stroke="#F2B84B" stroke-width="1.5" marker-end="url(#arrow)"/>
        <path d="M85,60 L172,70" stroke="#F2B84B" stroke-width="1.5" marker-end="url(#arrow)"/>
        <path d="M85,60 L163,108" stroke="#F2B84B" stroke-width="1.5" marker-end="url(#arrow)"/>

<div class="slide-inner">
  <div class="glossary-tag">📖 名詞解釋 ⑤</div>
  <h1 class="title">我們說的「<span class="accent2">AI 模型</span>」，到底是什麼？</h1>
  <div class="body-area">
    <p class="lead">先破除迷思：這裡說的AI模型<b style="color:var(--text-primary)">不是</b>ChatGPT那種聊天機器人，而是幾種具體、可落地的資料分析技術：</p>
    <div class="term-grid">
      <div class="term-card">
        <div class="tname">異常偵測 <span class="en">Anomaly Detection</span></div>
        <div class="tdesc">讓電腦自動比對「現在的數據」跟「過去正常的數據」，找出「跟平常不一樣」的地方，不用工程師一筆一筆盯著看。</div>
      </div>
      <div class="term-card">
        <div class="tname">預測性維護 <span class="en">PM / RUL 預測</span></div>
        <div class="tdesc">PM=Preventive Maintenance(預防性保養)，RUL=Remaining Useful Life(剩餘壽命)。用耗材的使用趨勢，預測「還能撐多久、什麼時候該換」，而不是固定週期硬換。</div>
      </div>
      <div class="term-card">
        <div class="tname">虛擬量測 <span class="en">Virtual Metrology</span></div>
        <div class="tdesc">不用把晶圓拿去實際量測（費時），而是用製程參數「預測」品質結果（例如膜厚），大幅減少離線抽測的次數。</div>
      </div>
      <div class="term-card">
        <div class="tname">Wafer健康分數 <span class="en">PCA / Autoencoder</span></div>
        <div class="tdesc">兩種常見統計/AI技術，用來把一片晶圓「一整條」製程曲線，跟「黃金批次(表現最好的參考批次)」比對，算出一個異常分數。分數越高代表這片wafer的製程曲線長得越「不正常」。</div>
      </div>
    </div>
  </div>
</div>
`);

/* ============================================================
   ENGINE
   ============================================================ */
const deck = document.getElementById('deck');
SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.section = s.section;
  div.innerHTML = s.html;
  deck.appendChild(div);
});

let current = 0;
const total = SLIDES.length;
document.getElementById('totalNum').textContent = total;

const dotsWrap = document.getElementById('dotsWrap');
SLIDES.forEach((s, i) => {
  const dot = document.createElement('div');
  dot.className = 'nav-dot';
  dot.title = s.section;
  dot.addEventListener('click', () => goTo(i));
  dotsWrap.appendChild(dot);
});

function render(){
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });
  document.getElementById('curNum').textContent = current + 1;
  document.getElementById('sectionLabel').textContent = SLIDES[current].section;
  document.getElementById('progressBar').style.width = ((current+1)/total*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === total - 1;
  document.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===current));
}
function goTo(i){
  if (i < 0 || i >= total) return;
  current = i;
  render();
}
document.getElementById('prevBtn').addEventListener('click', () => goTo(current-1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current+1));
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { goTo(current+1); e.preventDefault(); }
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') { goTo(current-1); e.preventDefault(); }
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End') goTo(total-1);
});

/* touch swipe */
let touchStartX = null;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx > 60) goTo(current-1);
  if (dx < -60) goTo(current+1);
  touchStartX = null;
});

render();
</script>
</body>
</html>
